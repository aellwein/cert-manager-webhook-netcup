name: build image

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      platform:
        required: true
        type: string
      image_tag:
        required: true
        type: string

env:
  KO_DOCKER_REPO: ghcr.io/aellwein

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}        

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: Setup ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9.0

      - name: Set tag output
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"

      - name: run ko build
        id: ko-build
        env:
          auth_token: ${{ github.token }}
        run: |
          echo "${auth_token}" | ko login ghcr.io -u aellwein --password-stdin && \
          VERSION="0.0.0-dev" KO_DEFAULTBASEIMAGE=gcr.io/distroless/static-debian12 ko build -B -t ${{ inputs.image_tag }}  --platform=${{ inputs.platform }}
          docker pull ${KO_DOCKER_REPO}/cert-manager-webhook-netcup:${{ inputs.image_tag }}
          docker inspect --format='{{index .RepoDigests 0}}' ${KO_DOCKER_REPO}/cert-manager-webhook-netcup:${{ inputs.image_tag }} | sed -e 's/.*@//' > image_digest.txt
          DIGEST=$(cat image_digest.txt)
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Image digest: ${DIGEST}"          
