name: Build Image (branch:develop - linux/arm64)

on:
  workflow_dispatch:
  push:
    branches:
      - develop

env:
  KO_DOCKER_REPO: ghcr.io/aellwein

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: Setup ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9.0

      - name: Set tag output
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"

      - name: run ko build (on develop)
        id: ko-build
        env:
          auth_token: ${{ github.token }}
        if: github.ref == 'refs/heads/develop' && success()
        run: |
          echo "${auth_token}" | ko login ghcr.io -u aellwein --password-stdin && \
          VERSION="0.0.0-dev" KO_DEFAULTBASEIMAGE=gcr.io/distroless/static-debian12 ko build -B -t develop  --platform=linux/arm64
          docker pull ${KO_DOCKER_REPO}/cert-manager-webhook-netcup:develop
          docker inspect --format='{{index .RepoDigests 0}}' ${KO_DOCKER_REPO}/cert-manager-webhook-netcup:develop | sed -e 's/.*@//' > image_digest.txt
          DIGEST=$(cat image_digest.txt)
          echo "Built image with digest: ${DIGEST}"
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Push chart to OCI registry
        if: github.ref == 'refs/heads/develop' && success()
        run: |
          cd deploy/cert-manager-webhook-netcup
          yq e -i '.appVersion = "0.0.0-dev"' Chart.yaml
          yq e -i '.version = "0.0.0-dev"' Chart.yaml
          yq -e -i ".image.hash = \"${{ steps.ko-build.outputs.image_digest }}\"" values.yaml
          helm package . && helm push *.tgz oci://ghcr.io/aellwein/cert-manager-webhook-netcup
